name: Test Telegram Notification

on:
  workflow_dispatch:      # Allows manual trigger from GitHub Actions tab

jobs:
  test-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Send Test Alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH: .
        run: |
          python -c "
          from src.notifications import notify_application
          print('Sending test Telegram alert...')
          notify_application('Test Job Title', 'Test Company', 'MATCHED (GitHub Action Test)', 'https://github.com')
          print('Test alert sent!')
          "
